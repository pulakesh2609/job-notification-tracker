# Server Port
server.port=${PORT:8080}

# Database Configuration (Supports H2 locally, PostgreSQL in Prod)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASS:password}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Gmail SMTP Configuration (Requires App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:YOUR_GMAIL_ADDRESS@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:YOUR_16_CHAR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio SMS Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:YOUR_TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN:YOUR_TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER:YOUR_TWILIO_PHONE_NUMBER}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:1060763785202-r8nmrvc352rserqm0ig3omodb2603bvb.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Frontend URL for CORS & Redirects
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
